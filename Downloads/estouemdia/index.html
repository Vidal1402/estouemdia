<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estou em dia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="stage">
    <div class="hero-inner">
      <section class="left">
        <div class="tag">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="8"></circle>
            <circle cx="12" cy="12" r="2"></circle>
          </svg>
          <span>DE PESSOAS PARA PESSOAS</span>
        </div>

        <h1>Você em dia para <span>encontrar oportunidades financeiras</span></h1>

        <p class="subtitle">
          <svg class="shield" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 2 4 5v7c0 5.1 3.4 9.8 8 11 4.6-1.2 8-5.9 8-11V5l-8-3z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          <span>A sua nova opção para para organizar sua vida financeira.</span>
        </p>

        <div class="left-bottom">
          <div class="brand" aria-label="estou em dia">
            <span class="line">estou<span class="check">✓</span></span>
            <span class="line">em<span class="smiley">:)</span>dia</span>
          </div>

          <p class="rights">Todos os direitos reservados - Estou em dia</p>
        </div>
      </section>

      <section class="right" aria-hidden="true"></section>
    </div>

    <img
      class="hero-composition"
      src="assets/img-hero.png"
      alt="Pessoa sorrindo ao usar o celular, com elementos da marca Estou em dia"
      width="518"
      height="482"
      decoding="async"
      fetchpriority="high"
    >
  </main>
</body>
</html>
